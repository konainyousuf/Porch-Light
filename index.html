<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Only For Saad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --night-deep: #0b1530;
            --night-blue: #16264f;
            --night-soft: #22366b;
            --porch-amber: #ffb066;
            --porch-ember: #ff8a4c;
            --porch-core: #fff3d6;
            --cream: #f4ecdd;
            --cream-dim: rgba(244, 236, 221, 0.62);
            --glow-strength: 0.55;
            --sidebar-w: 128px;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: radial-gradient(ellipse at 50% 15%, var(--night-blue) 0%, var(--night-deep) 60%, #060b1c 100%);
            font-family: 'Nunito Sans', sans-serif;
            color: var(--cream);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }
        .stage {
            position: relative;
            min-height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-left: var(--sidebar-w);
        }

        /* ===== STARS ===== */
        .star {
            position: absolute;
            border-radius: 50%;
            background: #dfe6ff;
            opacity: 0.5;
            animation: twinkle 4s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.15;
            }
            50% {
                opacity: 0.9;
            }
        }

        /* ===== GREETING ===== */
        .greeting-overlay {
            position: fixed;
            inset: 0;
            background: rgba(6, 10, 24, 0.72);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transition: opacity 0.4s ease;
        }
        .greeting-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .greeting-card {
            background: linear-gradient(180deg, rgba(24, 36, 72, 0.97), rgba(11, 21, 48, 0.97));
            border: 1px solid rgba(255, 176, 102, 0.3);
            border-radius: 18px;
            padding: 30px 34px;
            max-width: min(420px, 86vw);
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 154, 77, 0.15);
        }
        .greeting-card p {
            font-family: 'Caveat', cursive;
            font-size: 1.9rem;
            color: var(--porch-core);
            margin: 0 0 18px;
            line-height: 1.3;
        }
        .greeting-card button {
            background: var(--porch-ember);
            border: none;
            color: #20130a;
            font-weight: 700;
            padding: 9px 26px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .greeting-card button:hover {
            background: var(--porch-amber);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: var(--sidebar-w);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 26px;
            z-index: 20;
            background: linear-gradient(180deg, rgba(11, 21, 48, 0.4), rgba(6, 10, 24, 0.15));
            border-right: 1px solid rgba(255, 176, 102, 0.1);
        }
        .tree-icon {
            font-size: 2.6rem;
            line-height: 1;
            filter: drop-shadow(0 0 10px rgba(34, 54, 107, 0.6));
        }
        .spider-wrap {
            position: relative;
            height: 34px;
            display: flex;
            justify-content: center;
            margin-bottom: 4px;
        }
        .thread {
            position: absolute;
            top: 0;
            left: 50%;
            width: 1px;
            height: 22px;
            background: rgba(244, 236, 221, 0.35);
        }
        .spider {
            position: absolute;
            top: 18px;
            font-size: 1.1rem;
            cursor: default;
        }
        .web-svg {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .web-svg line {
            stroke: rgba(244, 236, 221, 0.55);
            stroke-width: 1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .web-svg.show line {
            opacity: 0.8;
        }

        .side-nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
            width: 100%;
            padding: 0 10px;
            position: relative;
            z-index: 2;
        }
        .side-nav button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 176, 102, 0.22);
            color: var(--cream-dim);
            font-family: 'Nunito Sans', sans-serif;
            font-size: 0.72rem;
            padding: 10px 4px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            line-height: 1.15;
        }
        .side-nav button .ico {
            font-size: 1.3rem;
        }
        .side-nav button.active,
        .side-nav button:hover,
        .side-nav button:focus-visible {
            border-color: var(--porch-amber);
            color: var(--porch-core);
            background: rgba(255, 176, 102, 0.12);
        }

        .view {
            display: none;
            width: 100%;
            flex: 1;
            flex-direction: column;
            align-items: center;
        }
        .view.active {
            display: flex;
        }

        /* ==========================================================
           WINDOW VIEW — STRUCTURED CSS ANIME LANDSCAPE
           ========================================================== */
        #view-window {
            position: relative;
            min-height: 100vh;
            width: 100%;
            overflow: hidden;
            padding: 0;
            /* Rich blue evening sky (stars stay visible against it) fading into a forest meadow */
            background: linear-gradient(180deg, #14275a 0%, #1c3878 22%, #24487f 42%, #2c5a72 62%, #1c3a2c 82%, #0e1c17 100%);
        }

        /* Tree clusters framing either side of the meadow */
        .tree-cluster {
            position: absolute;
            bottom: 7%;
            width: 20%;
            max-width: 230px;
            height: auto;
            z-index: 2;
            pointer-events: none;
        }
        .tree-cluster-left { left: -3%; }
        .tree-cluster-right { right: -3%; transform: scaleX(-1); }

        /* Rolling hills — clean layered SVG silhouettes instead of gradient blobs */
        .hill-layer {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            display: block;
            pointer-events: none;
        }
        .hill-far {
            height: 40%;
            z-index: 1;
            opacity: 0.92;
        }
        .hill-near {
            height: 30%;
            z-index: 3;
        }

        /* Meadow ground — sits in front of the hills */
        .meadow-ground {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 13%;
            background: linear-gradient(180deg, #10231d 0%, #081410 100%);
            z-index: 4;
            pointer-events: none;
        }

        /* Meadow Flowers (Generated by JS) */
        .meadow-flowers {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 34%;
            z-index: 4;
            pointer-events: none;
            overflow: hidden;
        }
        .flower-dot {
            position: absolute;
            border-radius: 50%;
            z-index: 4;
        }

        /* orange cat — walks along the hill ridge, rolls only when clicked */
        .cat {
            position: absolute;
            bottom: 24%;
            left: 5%;
            z-index: 6;
            pointer-events: auto;
            cursor: pointer;
            transition: left linear;
        }
        .cat-body {
            display: inline-block;
            font-size: 2.1rem;
            filter: sepia(1) saturate(6) hue-rotate(-18deg) brightness(1.08) drop-shadow(0 4px 6px rgba(0,0,0,0.25));
            transform-origin: 50% 50%;
        }
        .cat-body.flip { transform: scaleX(-1); }
        .cat-body.walking { animation: cat-bob 0.42s ease-in-out infinite; }
        .cat-body.flip.walking { animation: cat-bob-flip 0.42s ease-in-out infinite; }
        @keyframes cat-bob {
            0%   { transform: translateY(0) rotate(0deg); }
            25%  { transform: translateY(-2px) rotate(-3deg); }
            50%  { transform: translateY(-4.5px) rotate(0deg); }
            75%  { transform: translateY(-2px) rotate(3deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }
        @keyframes cat-bob-flip {
            0%   { transform: scaleX(-1) translateY(0) rotate(0deg); }
            25%  { transform: scaleX(-1) translateY(-2px) rotate(3deg); }
            50%  { transform: scaleX(-1) translateY(-4.5px) rotate(0deg); }
            75%  { transform: scaleX(-1) translateY(-2px) rotate(-3deg); }
            100% { transform: scaleX(-1) translateY(0) rotate(0deg); }
        }
        /* small tufts of grass that rustle at the cat's feet while it walks */
        .grass-tuft {
            position: absolute;
            bottom: -2px;
            width: 9px;
            height: 6px;
            background: radial-gradient(ellipse at 50% 100%, rgba(120, 190, 130, 0.55), transparent 72%);
            border-radius: 50%;
            pointer-events: none;
            animation: tuft-pop 0.5s ease-out forwards;
        }
        @keyframes tuft-pop {
            0%   { opacity: 0.8; transform: scale(0.4) translateY(0); }
            100% { opacity: 0;   transform: scale(1.3) translateY(-6px); }
        }
        /* realistic on-the-back wriggle instead of a wheel-like spin */
        .cat-body.rolling { animation: cat-roll 1.3s ease-in-out; }
        @keyframes cat-roll {
            0%   { transform: rotate(0deg) translateY(0) scaleX(1); }
            10%  { transform: rotate(-8deg) translateY(1px) scaleX(1.02); }
            22%  { transform: rotate(-32deg) translateY(3px) scaleX(1.06); }
            35%  { transform: rotate(-14deg) translateY(2px) scaleX(0.97); }
            48%  { transform: rotate(22deg) translateY(4px) scaleX(1.08); }
            60%  { transform: rotate(6deg) translateY(2px) scaleX(0.96); }
            72%  { transform: rotate(-18deg) translateY(3px) scaleX(1.05); }
            85%  { transform: rotate(4deg) translateY(1px) scaleX(1.0); }
            100% { transform: rotate(0deg) translateY(0) scaleX(1); }
        }

        /* fireflies — soft elongated glow that pulses like real bioluminescence */
        .firefly {
            position: fixed;
            width: 9px;
            height: 6px;
            border-radius: 50%;
            background: radial-gradient(circle at 38% 35%, #fffce0 0%, var(--porch-amber) 55%, rgba(255,176,102,0) 100%);
            box-shadow: 0 0 10px 3px rgba(255, 190, 120, 0.5);
            cursor: pointer;
            border: none;
            animation: drift 12s ease-in-out infinite, firefly-pulse 2.4s ease-in-out infinite;
            transition: transform 0.2s ease, opacity 0.4s ease;
            z-index: 7;
            pointer-events: auto;
            will-change: transform, opacity;
        }
        @keyframes firefly-pulse {
            0%, 100% { opacity: 0.32; box-shadow: 0 0 4px 1px rgba(255, 190, 120, 0.28); }
            45%      { opacity: 0.55; box-shadow: 0 0 8px 2px rgba(255, 190, 120, 0.45); }
            70%      { opacity: 1;    box-shadow: 0 0 16px 6px rgba(255, 205, 140, 0.85); }
        }
        .firefly:hover {
            transform: scale(1.8);
            box-shadow: 0 0 25px 10px rgba(255, 176, 102, 0.8);
        }
        .firefly.caught {
            animation: none;
            opacity: 0;
            transform: scale(0.2);
            pointer-events: none;
        }
        .firefly.ember {
            background: radial-gradient(circle at 38% 35%, #fff2df 0%, var(--porch-ember) 55%, rgba(255,138,76,0) 100%);
            box-shadow: 0 0 10px 3px rgba(255, 138, 76, 0.5);
        }
        .firefly.deep {
            background: radial-gradient(circle at 38% 35%, #ffe9d6 0%, #ff7a3d 55%, rgba(255,122,61,0) 100%);
            box-shadow: 0 0 10px 3px rgba(255, 122, 61, 0.5);
        }
        @keyframes drift {
            0% {
                transform: translate(0, 0);
            }
            25% {
                transform: translate(25px, -30px);
            }
            50% {
                transform: translate(-15px, -45px);
            }
            75% {
                transform: translate(-30px, -15px);
            }
            100% {
                transform: translate(0, 0);
            }
        }

        /* ===== FIREFLY POPUP NOTE ===== */
        .firefly-popup {
            position: fixed;
            z-index: 999;
            background: rgba(10, 25, 15, 0.9);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 200, 0.15);
            border-radius: 16px;
            padding: 12px 18px;
            font-family: 'Caveat', cursive;
            font-size: 1.1rem;
            color: #fdfae8;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(255, 176, 102, 0.1);
            opacity: 0;
            transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(12px) scale(0.9);
            pointer-events: none;
            max-width: 220px;
            text-align: center;
            line-height: 1.3;
            word-break: break-word;
        }
        .firefly-popup.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .firefly-popup::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: rgba(10, 25, 15, 0.9) transparent transparent transparent;
        }

        /* ---- NOTE SEARCH BAR ---- */
        .note-panel {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: min(360px, 88vw);
            z-index: 10;
            display: flex;
            flex-direction: column-reverse;
            gap: 8px;
        }
        .search-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(10, 20, 28, 0.82);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 176, 102, 0.18);
            border-radius: 999px;
            padding: 10px 8px 10px 16px;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
        }
        .search-icon {
            font-size: 0.85rem;
            opacity: 0.75;
            flex: none;
        }
        .search-input {
            flex: 1;
            min-width: 0;
            background: none;
            border: none;
            outline: none;
            color: var(--cream);
            font-family: 'Nunito Sans', sans-serif;
            font-size: 0.8rem;
        }
        .search-input::placeholder {
            color: var(--cream-dim);
        }
        .search-send {
            background: var(--porch-ember);
            border: none;
            color: #20130a;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: none;
            transition: background 0.2s;
        }
        .search-send:hover { background: var(--porch-amber); }

        /* messages area — grows upward above the search bar, collapsed when empty */
        .message-area {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 0;
            overflow-y: auto;
            padding: 0 4px;
            opacity: 0;
            transition: max-height 0.35s ease, opacity 0.3s ease, padding 0.3s ease;
        }
        .message-area.has-messages {
            max-height: 30vh;
            opacity: 1;
            padding: 8px 4px;
        }
        .message-area::-webkit-scrollbar {
            width: 4px;
        }
        .message-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .message-area::-webkit-scrollbar-thumb {
            background: rgba(255, 176, 102, 0.3);
            border-radius: 8px;
        }

        .msg {
            display: flex;
            gap: 8px;
            animation: msgIn 0.35s ease;
        }
        .msg .msg-avatar {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            flex: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 176, 102, 0.12);
        }
        .msg .msg-bubble {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 12px 12px 12px 4px;
            padding: 6px 11px;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 0.78rem;
            line-height: 1.35;
            color: var(--cream);
            max-width: 82%;
            word-break: break-word;
        }
        .msg.note-msg .msg-bubble {
            background: rgba(200, 180, 255, 0.08);
            border: 1px solid rgba(200, 180, 255, 0.15);
            color: #d4c8ff;
            font-style: italic;
        }
        .msg.note-msg .msg-avatar {
            background: rgba(200, 180, 255, 0.1);
            border-color: rgba(200, 180, 255, 0.2);
        }
        .msg.reply-msg .msg-bubble {
            background: rgba(255, 176, 102, 0.1);
            border: 1px solid rgba(255, 176, 102, 0.22);
            color: var(--porch-core);
        }
        .msg.reply-msg .msg-avatar {
            background: rgba(255, 176, 102, 0.12);
            border-color: rgba(255, 176, 102, 0.3);
        }
        @keyframes msgIn {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* count badge */
        .count-badge {
            position: fixed;
            top: 16px;
            right: 20px;
            z-index: 12;
            font-size: 0.72rem;
            color: var(--cream-dim);
            background: rgba(10, 20, 28, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-radius: 999px;
            border: 1px solid rgba(255, 176, 102, 0.1);
            pointer-events: none;
        }

        /* ===== GAME VIEWS (cricket, bike, pool) ===== */
        .game-heading {
            font-family: 'Caveat', cursive;
            font-size: 2.1rem;
            font-weight: 600;
            color: var(--porch-core);
            text-shadow: 0 0 20px rgba(255, 176, 102, 0.22);
            text-align: center;
            margin: 5vh 0 0;
            width: min(560px, 86vw);
        }
        .game-wrap {
            width: min(600px, 90vw);
            text-align: center;
            padding: 10px 0 6vh;
            z-index: 4;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 2vh;
        }
        .game-caption {
            font-family: 'Caveat', cursive;
            font-size: 1.45rem;
            color: var(--porch-amber);
            min-height: 2.4rem;
            margin: 10px 0 4px;
            max-width: 520px;
        }
        .game-stats {
            font-size: 0.85rem;
            color: var(--cream-dim);
            margin-top: 8px;
            letter-spacing: 0.02em;
        }
        .game-reset {
            background: none;
            border: 1px solid rgba(255, 176, 102, 0.35);
            color: var(--cream-dim);
            padding: 7px 16px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.78rem;
            margin-top: 12px;
        }
        .game-reset:hover {
            border-color: var(--porch-amber);
            color: var(--porch-core);
        }
        .swing-btn {
            margin-top: 16px;
            background: var(--porch-ember);
            border: none;
            color: #20130a;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 14px 34px;
            border-radius: 999px;
            cursor: pointer;
            touch-action: none;
        }
        .swing-btn:hover {
            background: var(--porch-amber);
        }
        .swing-btn:active {
            transform: scale(0.96);
        }

        /* cricket */
        .pitch {
            position: relative;
            width: 100%;
            height: min(38vh, 300px);
            background: linear-gradient(180deg, #1c3168 0%, #142450 60%, #0e1a3c 100%);
            border-radius: 16px;
            border: 1px solid rgba(255, 176, 102, 0.15);
            overflow: hidden;
            cursor: ns-resize;
        }
        .sweet-zone {
            position: absolute;
            right: 64px;
            top: 0;
            bottom: 0;
            width: 50px;
            background: rgba(255, 176, 102, 0.08);
            border-left: 1px dashed rgba(255, 176, 102, 0.3);
            border-right: 1px dashed rgba(255, 176, 102, 0.3);
        }
        .batter {
            position: absolute;
            right: 20px;
            top: 50%;
            font-size: 2rem;
            transform: translateY(-50%) scaleX(-1) rotate(0deg);
            transform-origin: 50% 50%;
        }
        .batter.swinging {
            animation: bat-swing 0.35s ease-out;
        }
        @keyframes bat-swing {
            0% {
                transform: translateY(-50%) scaleX(-1) rotate(0deg);
            }
            40% {
                transform: translateY(-50%) scaleX(-1) rotate(-55deg);
            }
            70% {
                transform: translateY(-50%) scaleX(-1) rotate(15deg);
            }
            100% {
                transform: translateY(-50%) scaleX(-1) rotate(0deg);
            }
        }
        .bowler {
            position: absolute;
            left: 16px;
            top: 50%;
            font-size: 1.8rem;
            transform: translateY(-50%) scaleX(-1);
        }
        .ball {
            position: absolute;
            left: 66px;
            top: 50%;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #ffdede, var(--porch-ember) 60%, #8a2b12 100%);
            box-shadow: 0 0 6px rgba(255, 138, 76, 0.6);
            transform: translateY(-50%);
            transition: none;
        }

        /* bike */
        .clutch-scene {
            position: relative;
            width: 100%;
            height: min(34vh, 260px);
            background: linear-gradient(180deg, #16264f 0%, #101f45 55%, #0b1530 100%);
            border-radius: 16px;
            border: 1px solid rgba(255, 176, 102, 0.15);
            overflow: hidden;
        }
        .peak {
            position: absolute;
            bottom: 0;
            width: 0;
            height: 0;
            opacity: 0.5;
        }
        .peak.p1 {
            left: 5%;
            border-left: 60px solid transparent;
            border-right: 60px solid transparent;
            border-bottom: 90px solid #22366b;
        }
        .peak.p2 {
            left: 32%;
            border-left: 80px solid transparent;
            border-right: 80px solid transparent;
            border-bottom: 130px solid #1b2c5c;
        }
        .peak.p3 {
            right: 6%;
            border-left: 70px solid transparent;
            border-right: 70px solid transparent;
            border-bottom: 100px solid #22366b;
        }
        .road {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: #0a1330;
            border-top: 2px dashed rgba(255, 243, 214, 0.25);
        }
        .rider {
            position: absolute;
            bottom: 26px;
            left: 40px;
            font-size: 2.3rem;
            transition: transform 0.12s ease;
            z-index: 3;
            transform: scaleX(-1);
        }
        .rider.crouch {
            transform: scaleX(-1) translateY(4px) scaleY(0.9);
        }
        .rider.jumping {
            animation: bike-jump 0.75s ease-out;
        }
        @keyframes bike-jump {
            0% {
                transform: scaleX(-1) translateY(0);
            }
            35% {
                transform: scaleX(-1) translateY(-112px);
            }
            65% {
                transform: scaleX(-1) translateY(-112px);
            }
            100% {
                transform: scaleX(-1) translateY(0);
            }
        }
        .obstacle {
            position: absolute;
            bottom: 26px;
            width: 26px;
            height: 20px;
            background: var(--porch-ember);
            border-radius: 50% 50% 2px 2px / 100% 100% 2px 2px;
            box-shadow: 0 0 8px rgba(255, 138, 76, 0.5);
            z-index: 2;
        }

        /* ===== 8-BALL POOL ===== */
        .pool-table {
            position: relative;
            width: 100%;
            height: min(50vh, 400px);
            background: #1a3a2a;
            border-radius: 20px;
            border: 10px solid #3d2b1a;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6), 0 10px 40px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            touch-action: none;
        }
        .pool-table canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            background: #1e7a4a;
            cursor: crosshair;
        }
        .pool-controls {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .pool-controls button {
            background: var(--porch-ember);
            border: none;
            color: #20130a;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .pool-controls button:hover {
            background: var(--porch-amber);
        }
        .pool-controls .power-indicator {
            font-size: 0.8rem;
            color: var(--cream-dim);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .pool-controls .power-bar {
            width: 100px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .pool-controls .power-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--porch-amber);
            border-radius: 4px;
            transition: width 0.05s linear;
        }

        @media (prefers-reduced-motion: reduce) {
            .firefly,
            .panel-avatar,
            .star {
                animation: none !important;
            }
        }

        @media (max-width: 640px) {
            :root {
                --sidebar-w: 76px;
            }
            .tree-icon {
                font-size: 1.8rem;
            }
            .side-nav button {
                font-size: 0.62rem;
                padding: 8px 2px;
            }
            .side-nav button .ico {
                font-size: 1.1rem;
            }
            .note-panel {
                bottom: 10px;
                width: 90vw;
                max-height: 42vh;
            }
            .message-area {
                max-height: 18vh;
                min-height: 44px;
                padding: 8px 10px 5px 10px;
            }
            .count-badge {
                font-size: 0.6rem;
                padding: 4px 12px;
                top: 10px;
                right: 12px;
            }
            .firefly {
                width: 6px;
                height: 4px;
                box-shadow: 0 0 8px 3px rgba(255, 176, 102, 0.5);
            }
            .pool-table {
                height: min(45vh, 300px);
            }
        }
        .pool-hud{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin:18px 0;
}

.hud-box{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.12);

padding:12px;

.hud-title{

font-size:1.4rem;

}

justify-content:space-between;
align-items:center;
gap:15px;

}

#difficultySelect{

color:white;

}
    </style>
</head>

    <script>
        (function() {
            // ==============================================================
            // GREETING
            // ==============================================================
            const greetingOverlay = document.getElementById('greetingOverlay');
            const greetingText = document.getElementById('greetingText');
            const greetingClose = document.getElementById('greetingClose');
            const hour = new Date().getHours();
            let greetWord = 'Hello';
            if (hour < 5) greetWord = 'Still up';
            else if (hour < 12) greetWord = 'Good morning';
            else if (hour < 17) greetWord = 'Good afternoon';
            else if (hour < 21) greetWord = 'Good evening';
            else greetWord = 'Good night';
            const greetLines = {
                morning: ["a good day to start slow.", "no rush, the day's got time."],
                afternoon: ["hope it's being kind to you so far.", "however it's going, this is still here."],
                evening: ["the light's been on all day, waiting for this bit.", "come sit for a while."],
                night: ["everyone else is asleep, this porch light isn't.", "still here, whatever hour it is."]
            };
            let pool = greetLines.afternoon;
            if (hour < 5 || hour >= 21) pool = greetLines.night;
            else if (hour < 12) pool = greetLines.morning;
            else if (hour >= 17) pool = greetLines.evening;
            const sub = pool[Math.floor(Math.random() * pool.length)];
            greetingText.textContent = greetWord + ', Saad. ' + sub;
            greetingClose.addEventListener('click', () => greetingOverlay.classList.add('hidden'));
            greetingOverlay.addEventListener('click', function(e) {
                if (e.target === greetingOverlay) greetingOverlay.classList.add('hidden');
            });

            // ==============================================================
            // STARS (Now appended to view-window so they sit on the sky)
            // ==============================================================
            const starContainer = document.getElementById('view-window');
            const starCount = window.innerWidth < 600 ? 30 : 75;
            for (let i = 0; i < starCount; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const inBand = Math.random() < 0.4;
                let size, leftVw, topVh, opacity;
                if (inBand) {
                    // cluster along the diagonal galaxy band for a denser starry streak
                    const t = Math.random();
                    leftVw = -10 + t * 120;
                    topVh = 6 + t * 34 + (Math.random() - 0.5) * 10;
                    size = Math.random() * 1.6 + 0.8;
                    opacity = 0.4 + Math.random() * 0.5;
                } else {
                    leftVw = Math.random() * 100;
                    topVh = Math.random() * 55;
                    size = Math.random() * 2 + 1;
                    opacity = 0.3 + Math.random() * 0.5;
                }
                s.style.width = size + 'px';
                s.style.height = size + 'px';
                s.style.left = leftVw + 'vw';
                s.style.top = topVh + 'vh';
                s.style.opacity = opacity;
                s.style.animationDelay = (Math.random() * 4) + 's';
                starContainer.appendChild(s);
            }

            // ==============================================================
            // MEADOW FLOWERS (Code-generated)
            // ==============================================================
            const meadowFlowers = document.getElementById('meadowFlowers');
            if (meadowFlowers) {
                const colors = ['#e8e6f5', '#cfd8ea', '#d9c9ec', '#f0e6d2', '#c9d9d0', '#e0d5e8'];
                for (let i = 0; i < 70; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'flower-dot';
                    const size = 2 + Math.random() * 4;
                    const shape = Math.random() > 0.6 ? '50% 0 50% 50%' : '50%';
                    dot.style.cssText = `
                        position: absolute;
                        width: ${size}px;
                        height: ${size}px;
                        border-radius: ${shape};
                        background: ${colors[Math.floor(Math.random() * colors.length)]};
                        left: ${Math.random() * 100}%;
                        top: ${30 + Math.random() * 65}%;
                        opacity: ${0.25 + Math.random() * 0.35};
                        transform: rotate(${Math.random() * 360}deg);
                    `;
                    meadowFlowers.appendChild(dot);
                }
            }

            // ==============================================================
            // SIDEBAR NAV + SPIDER WEB
            // ==============================================================
            const navButtons = document.querySelectorAll('.side-nav button');
            const sidebar = document.getElementById('sidebar');
            const spiderIcon = document.getElementById('spiderIcon');
            const webSvg = document.getElementById('webSvg');
            const webLine1 = document.getElementById('webLine1');
            const webLine2 = document.getElementById('webLine2');
            const webLine3 = document.getElementById('webLine3');
            const views = {
                window: document.getElementById('view-window'),
                cricket: document.getElementById('view-cricket'),
                bike: document.getElementById('view-bike'),
                pool: document.getElementById('view-pool'),
            };

            function spinWebTo(btn) {
                const sbRect = sidebar.getBoundingClientRect();
                const spRect = spiderIcon.getBoundingClientRect();
                const btRect = btn.getBoundingClientRect();
                const sx = spRect.left + spRect.width / 2 - sbRect.left;
                const sy = spRect.top + spRect.height / 2 - sbRect.top;
                const bx = btRect.left + btRect.width / 2 - sbRect.left;
                const by = btRect.top + btRect.height / 2 - sbRect.top;
                webLine1.setAttribute('x1', sx);
                webLine1.setAttribute('y1', sy);
                webLine1.setAttribute('x2', bx - 8);
                webLine1.setAttribute('y2', by);
                webLine2.setAttribute('x1', sx);
                webLine2.setAttribute('y1', sy);
                webLine2.setAttribute('x2', bx);
                webLine2.setAttribute('y2', by - 5);
                webLine3.setAttribute('x1', sx);
                webLine3.setAttribute('y1', sy);
                webLine3.setAttribute('x2', bx + 8);
                webLine3.setAttribute('y2', by);
                webSvg.classList.add('show');
            }

            navButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    navButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    Object.values(views).forEach(v => v.classList.remove('active'));
                    views[btn.dataset.view].classList.add('active');
                    spinWebTo(btn);
                    if (btn.dataset.view === 'pool') setTimeout(initPool, 100);
                });
            });

            window.addEventListener('load', function() {
                const activeBtn = document.querySelector('.side-nav button.active');
                if (activeBtn) spinWebTo(activeBtn);
            });
            window.addEventListener('resize', function() {
                const activeBtn = document.querySelector('.side-nav button.active');
                if (activeBtn) spinWebTo(activeBtn);
            });

            // ==============================================================
            // FIREFLIES + FLOATING POPUPS
            // ==============================================================
            const FIREFLY_MESSAGES = [
                "keep going",
                "you're doing great",
                "i'm proud of you",
                "uncs can be cool too",
                "daredevil is here woohoo!!",
                "punch more bugs if you're having a bad day",
                "You're not a hot mess; you're a spicy little disaster, and honestly? It's a whole vibe. Own it.",
                "Adulting is a pyramid scheme. You can't get fired from it, and no one actually knows the rules, so just fake it till you make it (or take a nap).",
                "The universe is 13.8 billion years old. You being late to work doesn't even register on the cosmic scale.",
                "Life's LBW—review's just chai.",
                "Are you sun? cause you've brightened up my day.",
                "Don't be a stressosaurous.",
                "Be an unskippable AD.",
                "You're made of stardust. Act like it.",
                "This moment is yours — breathe it in.",
                "The forest has seen empires fall. You're doing fine.",
                "Even the tallest trees started as seeds.",
                "You are exactly where you need to be."
            ];

            const fireflyContainer = document.getElementById('fireflyContainer');
            const countBadge = document.getElementById('countBadge');
            let caughtCount = 0;

            const fireflyCount = window.innerWidth < 600 ? 30 : 45;
            const colours = ['', '', 'ember', 'deep'];
            // structured swarm clusters instead of pure scatter — feels like real firefly groups
            // near the treeline and meadow edges rather than floating anywhere on screen
            const clusterCenters = [
                { x: 10, y: 62 }, { x: 24, y: 40 }, { x: 40, y: 70 },
                { x: 58, y: 48 }, { x: 72, y: 66 }, { x: 88, y: 42 }, { x: 95, y: 74 }
            ];

            function addFirefly() {
                const f = document.createElement('button');
                f.className = 'firefly';
                const colorClass = colours[Math.floor(Math.random() * colours.length)];
                if (colorClass) f.classList.add(colorClass);
                f.setAttribute('aria-label', 'a small light — click it');
                const cluster = clusterCenters[Math.floor(Math.random() * clusterCenters.length)];
                const jitterX = (Math.random() - 0.5) * 22;
                const jitterY = (Math.random() - 0.5) * 22;
                const leftPct = Math.max(2, Math.min(97, cluster.x + jitterX));
                const topPct = Math.max(3, Math.min(88, cluster.y + jitterY));
                f.style.left = leftPct + 'vw';
                f.style.top = topPct + 'vh';
                f.style.animationDuration = (9 + Math.random() * 8) + 's, ' + (1.8 + Math.random() * 1.6) + 's';
                f.style.animationDelay = (Math.random() * 6) + 's, ' + (Math.random() * 2.4) + 's';
                const size = 7 + Math.random() * 6;
                f.style.width = size + 'px';
                f.style.height = (size * 0.62) + 'px';

                f.addEventListener('click', function(e) {
                    if (f.classList.contains('caught')) return;
                    f.classList.add('caught');
                    caughtCount++;
                    countBadge.textContent = '✦ ' + caughtCount + (caughtCount === 1 ? ' light' : ' lights');

                    // Create floating popup
                    const msg = FIREFLY_MESSAGES[Math.floor(Math.random() * FIREFLY_MESSAGES.length)];
                    const popup = document.createElement('div');
                    popup.className = 'firefly-popup';
                    const rect = f.getBoundingClientRect();
                    popup.textContent = msg;
                    // Center the popup above the firefly
                    popup.style.left = (rect.left + rect.width / 2 - 110) + 'px';
                    popup.style.top = (rect.top - 20) + 'px';
                    document.body.appendChild(popup);

                    // Animate in
                    requestAnimationFrame(() => popup.classList.add('show'));
                    
                    // Remove after 3.5 seconds
                    setTimeout(() => {
                        popup.classList.remove('show');
                        setTimeout(() => popup.remove(), 400);
                    }, 3500);
                });
                fireflyContainer.appendChild(f);
            }

            for (let i = 0; i < fireflyCount; i++) addFirefly();

            // ==============================================================
            // ORANGE CAT — wanders the meadow, occasionally rolls on the grass
            // ==============================================================
            const orangeCat = document.getElementById('orangeCat');
            const catBody = document.getElementById('catBody');
            const HILL_MIN = 4, HILL_MAX = 46; // percent range spanning the near hill's ridge
            let catPos = HILL_MIN;
            let catIsRolling = false;

            function bowlBall() {
                if (ballActive) return;

            function runsForProgress(p) {
                if (p >= 0.80 && p <= 0.87) return { runs: 6, label: 'SIX!' };
                if ((p >= 0.74 && p < 0.80) || (p > 0.87 && p <= 0.91)) return { runs: 4, label: 'FOUR!' };
                if ((p >= 0.66 && p < 0.74) || (p > 0.91 && p <= 0.95)) return { runs: 2, label: 'two runs.' };
                if ((p >= 0.55 && p < 0.66) || (p > 0.95)) return { runs: 1, label: 'one run.' };
                return { runs: 0, label: p < 0.55 ? 'bit early, dot ball.' : 'dot ball.' };
            }

            function stepDown(runs) {
                const tiers = [0, 1, 2, 4, 6];

            function registerBall(runs, label) {

                        ', bat wasn\'t quite on the line.');

            function loadHighScore() {

            function gameLoop(timestamp) {
                if (gameState !== 'running') return;
                if (!lastFrameTime) lastFrameTime = timestamp;

                lastFrameTime = timestamp;
                const rLeft = riderLeft(),

            // ==============================================================
            // 8‑BALL POOL
            // ==============================================================
            const poolCanvas = document.getElementById('poolCanvas');
            const poolTable = document.getElementById('poolTable');
            const poolStatus = document.getElementById('poolStatus');
            const poolCaption = document.getElementById('poolCaption');
            const poolResetBtn = document.getElementById('poolResetBtn');
            const powerFill = document.getElementById('powerFill');

            let ctx, W, H;
            let cueBall, eightBall;
            let balls = [];
            const FRICTION = 0.985;
            const MIN_SPEED = 0.1;
            const CUSHION_BOUNCE = 0.7;
            const RADIUS = 10;
            const POCKET_RADIUS = 18;

            let isDragging = false,
                startX = 0,
                startY = 0,
                currentX = 0,
                currentY = 0;
            let power = 0;
            let isMoving = false;

            // turn-based opponent
            let turn = 'player';
            let gameOverPool = false;
            let pocketedThisTurn = 0;
            let scratchedThisTurn = false;
            const WIN_LINES = [
                "nice shot. you actually beat somebody at something today.",
                "champion of a pool table that only exists in a browser tab. still counts.",
                "🎉 you win. mountain, bike, and now pool — not bad for tonight."
            ];
            const LOSE_LINES = [
                "lost to a made-up opponent with no hands. rematch?",
                "the house always wins, apparently, even a house that's just some code.",
                "no shame in it, they've been practicing since before the page loaded."
            ];

            function resizeCanvas() {
                const rect = poolTable.getBoundingClientRect();
                poolCanvas.width = rect.width;
                poolCanvas.height = rect.height;
                W = poolCanvas.width;
                H = poolCanvas.height;
                ctx = poolCanvas.getContext('2d');
                initBalls();
                draw();
            }

            function initBalls() {
                const cx = W * 0.28,
                    cy = H / 2;
                cueBall = { x: cx, y: cy, vx: 0, vy: 0, radius: RADIUS, color: '#fff' };

                // Standard triangle rack, apex toward the cue ball, 8-ball centered in the back row
                const apexX = W * 0.66;
                const rowGapX = RADIUS * 1.85;
                const rowGapY = RADIUS * 2.05;

                balls = [];
                // row 1 — apex
                balls.push({ x: apexX, y: cy, vx: 0, vy: 0, radius: RADIUS, color: '#f4a460' });
                // row 2
                balls.push({ x: apexX + rowGapX, y: cy - rowGapY / 2, vx: 0, vy: 0, radius: RADIUS, color: '#4682b4' });
                balls.push({ x: apexX + rowGapX, y: cy + rowGapY / 2, vx: 0, vy: 0, radius: RADIUS, color: '#daa520' });
                // row 3 — outer two, 8-ball takes the centered spot
                balls.push({ x: apexX + rowGapX * 2, y: cy - rowGapY, vx: 0, vy: 0, radius: RADIUS, color: '#cd5c5c' });
                balls.push({ x: apexX + rowGapX * 2, y: cy + rowGapY, vx: 0, vy: 0, radius: RADIUS, color: '#2e8b57' });
                eightBall = { x: apexX + rowGapX * 2, y: cy, vx: 0, vy: 0, radius: RADIUS, color: '#222' };

                const all = [cueBall, eightBall, ...balls];
                all.forEach((b, i) => b.id = i);
                window.poolBalls = all;
                isMoving = false;
                power = 0;
                turn = 'player';
                gameOverPool = false;
                pocketedThisTurn = 0;
                scratchedThisTurn = false;
                powerFill.style.width = '0%';
                poolStatus.textContent = 'your shot — aim & shoot';
                poolCaption.textContent = '';
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);
                ctx.fillStyle = '#1a7a4a';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#0a1a0a';
                [
                    [0, 0],
                    [W, 0],
                    [0, H],
                    [W, H],
                    [W / 2, 0],
                    [W / 2, H]
                ].forEach(([x, y]) => {
                    ctx.beginPath();
                    ctx.arc(x, y, POCKET_RADIUS, 0, 2 * Math.PI);
                    ctx.fill();
                });
                ctx.strokeStyle = '#3d2b1a';
                ctx.lineWidth = 4;
                ctx.strokeRect(0, 0, W, H);

                const all = window.poolBalls || [];
                all.forEach(b => {
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.radius, 0, 2 * Math.PI);
                    ctx.fillStyle = b.color || '#fff';
                    ctx.fill();
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    if (b === eightBall) {
                        ctx.fillStyle = '#fff';
                        ctx.font = 'bold 12px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('8', b.x, b.y);
                    }
                });

                if (isDragging && !isMoving) {
                    ctx.beginPath();
                    ctx.moveTo(cueBall.x, cueBall.y);
                    const dx = startX - currentX,
                        dy = startY - currentY;
                    const len = Math.sqrt(dx * dx + dy * dy);
                    if (len > 5) {
                        const normX = dx / len,
                            normY = dy / len;
                        const lineLen = Math.min(len * 2, 100);
                        ctx.lineTo(cueBall.x + normX * lineLen, cueBall.y + normY * lineLen);
                        ctx.strokeStyle = 'rgba(255,255,200,0.5)';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        power = Math.min(1, len / 200);
                        powerFill.style.width = (power * 100) + '%';
                    }
                }
            }

            function updatePhysics() {
                const all = window.poolBalls || [];
                let moving = false;
                all.forEach(b => {
                    b.x += b.vx;
                    b.y += b.vy;
                    b.vx *= FRICTION;
                    b.vy *= FRICTION;
                    if (Math.abs(b.vx) < MIN_SPEED && Math.abs(b.vy) < MIN_SPEED) {
                        b.vx = 0;
                        b.vy = 0;
                    }
                    if (b.vx !== 0 || b.vy !== 0) moving = true;
                    if (b.x - b.radius < 0) { b.x = b.radius;
                        b.vx *= -CUSHION_BOUNCE; }
                    if (b.x + b.radius > W) { b.x = W - b.radius;
                        b.vx *= -CUSHION_BOUNCE; }
                    if (b.y - b.radius < 0) { b.y = b.radius;
                        b.vy *= -CUSHION_BOUNCE; }
                    if (b.y + b.radius > H) { b.y = H - b.radius;
                        b.vy *= -CUSHION_BOUNCE; }

                    const pockets = [
                        [0, 0],
                        [W, 0],
                        [0, H],
                        [W, H],
                        [W / 2, 0],
                        [W / 2, H]
                    ];
                    for (let p of pockets) {
                        const dx = b.x - p[0],
                            dy = b.y - p[1];
                        if (Math.sqrt(dx * dx + dy * dy) < POCKET_RADIUS) {
                            if (b === cueBall) {
                                b.x = W * 0.3;
                                b.y = H / 2;
                                b.vx = 0;
                                b.vy = 0;
                                scratchedThisTurn = true;
                                poolCaption.textContent = 'scratch — cue ball back in play.';
                            } else if (b === eightBall) {
                                b.x = W * 0.7;
                                b.y = H / 2;
                                b.vx = 0;
                                b.vy = 0;
                                gameOverPool = true;
                                if (turn === 'player') {
                                    poolStatus.textContent = 'you pocketed the 8-ball — you win!';
                                    poolCaption.textContent = WIN_LINES[Math.floor(Math.random() * WIN_LINES.length)];
                                } else {
                                    poolStatus.textContent = 'opponent pocketed the 8-ball — they win.';
                                    poolCaption.textContent = LOSE_LINES[Math.floor(Math.random() * LOSE_LINES.length)];
                                }
                                moving = false;
                            } else {
                                const idx = all.indexOf(b);
                                if (idx !== -1) all.splice(idx, 1);
                                pocketedThisTurn++;
                            }
                            break;
                        }
                    }
                });

                for (let i = 0; i < all.length; i++) {
                    for (let j = i + 1; j < all.length; j++) {
                        const a = all[i],
                            b = all[j];
                        const dx = b.x - a.x,
                            dy = b.y - a.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const minDist = a.radius + b.radius;
                        if (dist < minDist) {
                            const angle = Math.atan2(dy, dx);
                            const overlap = (minDist - dist) / 2;
                            a.x -= Math.cos(angle) * overlap;
                            a.y -= Math.sin(angle) * overlap;
                            b.x += Math.cos(angle) * overlap;
                            b.y += Math.sin(angle) * overlap;
                            const tempVx = a.vx,
                                tempVy = a.vy;
                            a.vx = b.vx;
                            a.vy = b.vy;
                            b.vx = tempVx;
                            b.vy = tempVy;
                        }
                    }
                }

                if (gameOverPool) moving = false;
                isMoving = moving;
                return moving;
            }

            function updateTurnUI() {
                if (gameOverPool) return;
                poolStatus.textContent = turn === 'player' ? 'your shot — aim & shoot' : "opponent's shot...";
            }

            function resolveTurn() {
                if (gameOverPool) return;
                const scratched = scratchedThisTurn;
                const pocketed = pocketedThisTurn;
                pocketedThisTurn = 0;
                scratchedThisTurn = false;

                if (scratched) {
                    turn = (turn === 'player') ? 'opponent' : 'player';
                } else if (pocketed > 0) {
                    // whoever just shot keeps their turn
                } else {
                    turn = (turn === 'player') ? 'opponent' : 'player';
                }

                updateTurnUI();
                if (!gameOverPool && turn === 'opponent') {
                    setTimeout(opponentShoot, 1100);
                }
            }

            function opponentShoot() {
                if (gameOverPool || isMoving) return;
                const all = window.poolBalls || [];
                let candidates = all.filter(b => b !== cueBall && b !== eightBall);
                if (candidates.length === 0) candidates = all.filter(b => b !== cueBall);
                if (candidates.length === 0) return;
                const target = candidates[Math.floor(Math.random() * candidates.length)];
                const dx = target.x - cueBall.x;
                const dy = target.y - cueBall.y;
                const len = Math.sqrt(dx * dx + dy * dy) || 1;
                const normX = dx / len,
                    normY = dy / len;
                const jitter = (Math.random() - 0.5) * 0.4;
                const cosA = Math.cos(jitter),
                    sinA = Math.sin(jitter);
                const jx = normX * cosA - normY * sinA;
                const jy = normX * sinA + normY * cosA;
                const powerVal = (0.5 + Math.random() * 0.45) * 12;
                cueBall.vx = jx * powerVal;
                cueBall.vy = jy * powerVal;
                isMoving = true;
                poolStatus.textContent = 'opponent is shooting...';
                poolCaption.textContent = '';
                animate();
            }

            function animate() {
                if (isMoving) {
                    updatePhysics();
                    draw();
                    requestAnimationFrame(animate);
                } else {
                    draw();
                    resolveTurn();
                }
            }

            function shoot() {
                if (isMoving) return;
                const dx = startX - currentX,
                    dy = startY - currentY;
                const len = Math.sqrt(dx * dx + dy * dy);
                if (len < 5) return;
                const normX = dx / len,
                    normY = dy / len;
                const powerVal = Math.min(1, len / 200) * 12;
                cueBall.vx = normX * powerVal;
                cueBall.vy = normY * powerVal;
                isMoving = true;
                poolStatus.textContent = 'shooting...';
                poolCaption.textContent = '';
                animate();
            }

            poolCanvas.addEventListener('mousedown', function(e) {
                if (isMoving || gameOverPool || turn !== 'player') return;
                const rect = poolCanvas.getBoundingClientRect();
                const scaleX = poolCanvas.width / rect.width;
                const scaleY = poolCanvas.height / rect.height;
                const mx = (e.clientX - rect.left) * scaleX;
                const my = (e.clientY - rect.top) * scaleY;
                const dx = mx - cueBall.x,
                    dy = my - cueBall.y;
                if (Math.sqrt(dx * dx + dy * dy) < 40) {
                    isDragging = true;
                    startX = mx;
                    startY = my;
                    currentX = mx;
                    currentY = my;
                }
            });
            poolCanvas.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                const rect = poolCanvas.getBoundingClientRect();
                const scaleX = poolCanvas.width / rect.width;
                const scaleY = poolCanvas.height / rect.height;
                currentX = (e.clientX - rect.left) * scaleX;
                currentY = (e.clientY - rect.top) * scaleY;
                draw();
            });
            poolCanvas.addEventListener('mouseup', function(e) {
                if (isDragging) {
                    isDragging = false;
                    shoot();
                }
            });
            poolCanvas.addEventListener('mouseleave', function() {
                if (isDragging) { isDragging = false;
                    draw(); }
            });

            poolCanvas.addEventListener('touchstart', function(e) {
                e.preventDefault();
                if (isMoving || gameOverPool || turn !== 'player') return;
                const rect = poolCanvas.getBoundingClientRect();
                const scaleX = poolCanvas.width / rect.width;
                const scaleY = poolCanvas.height / rect.height;
                const touch = e.touches[0];
                const mx = (touch.clientX - rect.left) * scaleX;
                const my = (touch.clientY - rect.top) * scaleY;
                const dx = mx - cueBall.x,
                    dy = my - cueBall.y;
                if (Math.sqrt(dx * dx + dy * dy) < 50) {
                    isDragging = true;
                    startX = mx;
                    startY = my;
                    currentX = mx;
                    currentY = my;
                }
            }, { passive: false });
            poolCanvas.addEventListener('touchmove', function(e) {
                e.preventDefault();
                if (!isDragging) return;
                const rect = poolCanvas.getBoundingClientRect();
                const scaleX = poolCanvas.width / rect.width;
                const scaleY = poolCanvas.height / rect.height;
                const touch = e.touches[0];
                currentX = (touch.clientX - rect.left) * scaleX;
                currentY = (touch.clientY - rect.top) * scaleY;
                draw();
            }, { passive: false });
            poolCanvas.addEventListener('touchend', function(e) {
                e.preventDefault();
                if (isDragging) {
                    isDragging = false;
                    shoot();
                }
            }, { passive: false });

            poolResetBtn.addEventListener('click', function() {
                initBalls();
                draw();
                powerFill.style.width = '0%';
                isMoving = false;
            });

            function initPool() {
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);
            }

            let poolInitialized = false;
            function ensurePoolInit() {
                if (!poolInitialized) {
                    poolInitialized = true;
                    initPool();
                }
            }

            navButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    if (this.dataset.view === 'pool') {
                        setTimeout(ensurePoolInit, 50);
                    }
                });
            });

        })();
    </script>
</body>
</html>
